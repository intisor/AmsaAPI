<!DOCTYPE html>
<html>
<head>
    <title>AMSA API Test Suite</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { margin: 5px; padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { border: 1px solid #ccc; padding: 10px; margin: 10px 0; background: #f9f9f9; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; max-height: 400px; }
        .upload-section { border: 2px dashed #ccc; padding: 20px; margin: 20px 0; background: #fafafa; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        input { padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h1>AMSA API Test Suite</h1>
    <div class="section" style="background: #e3f2fd;">
        <div style="margin-bottom: 10px;">
            <strong>POST /api/auth/token</strong><br>
            <input type="text" id="token-appid" placeholder="AppId" style="width: 120px;">
            <input type="text" id="token-secret" placeholder="AppSecret" style="width: 120px;">
            <input type="text" id="token-scopes" placeholder="Scopes (comma)" style="width: 160px;">
            <button onclick="callAuthToken()">Generate Token</button>
        </div>
        <div style="margin-bottom: 10px;">
            <strong>POST /api/auth/apps</strong><br>
            <input type="text" id="create-appid" placeholder="AppId" style="width: 90px;">
            <input type="text" id="create-appname" placeholder="AppName" style="width: 110px;">
            <input type="text" id="create-secret" placeholder="AppSecretHash" style="width: 120px;">
            <input type="text" id="create-scopes" placeholder="AllowedScopes" style="width: 120px;">
            <input type="number" id="create-expiry" placeholder="TokenExpirationHours" style="width: 80px;">
            <button onclick="callCreateApp()">Create App</button>
        </div>
        <div style="margin-bottom: 10px;">
            <strong>GET /api/auth/apps/{appId}</strong><br>
            <input type="text" id="get-appid" placeholder="AppId" style="width: 120px;">
            <button onclick="callGetApp()">Get App</button>
        </div>
        <div style="margin-bottom: 10px;">
            <strong>PUT /api/auth/apps/{appId}</strong><br>
            <input type="text" id="update-appid" placeholder="AppId" style="width: 80px;">
            <input type="text" id="update-appname" placeholder="AppName" style="width: 100px;">
            <input type="text" id="update-secret" placeholder="AppSecretHash" style="width: 110px;">
            <input type="text" id="update-scopes" placeholder="AllowedScopes" style="width: 110px;">
            <input type="number" id="update-expiry" placeholder="TokenExpirationHours" style="width: 80px;">
            <label><input type="checkbox" id="update-active"> Active</label>
            <button onclick="callUpdateApp()">Update App</button>
        </div>
        <div style="margin-bottom: 10px;">
            <strong>DELETE /api/auth/apps/{appId}</strong><br>
            <input type="text" id="delete-appid" placeholder="AppId" style="width: 120px;">
            <button onclick="callDeleteApp()">Delete App</button>
        </div>
    </div>
    
    <div class="section">
        <h3>Statistics & Dashboard</h3>
        <div class="grid">
            <button onclick="testEndpoint('GET', '/api/stats/dashboard')">Dashboard</button>
            <button onclick="testEndpoint('GET', '/api/stats/units')">Unit Stats</button>
            <button onclick="testEndpoint('GET', '/api/stats/departments')">Dept Stats</button>
        </div>
    </div>

    <div class="section">
        <h3>Members</h3>
        <div class="grid">
            <button onclick="testEndpoint('GET', '/api/members')">All Members</button>
            <button onclick="testEndpoint('GET', '/api/members/1')">Member by ID</button>
            <button onclick="testEndpoint('GET', '/api/members/mkan/1031')">By MKAN 1031</button>
            <button onclick="testEndpoint('GET', '/api/members/unit/14')">Unit 14 Members</button>
            <button onclick="testEndpoint('GET', '/api/members/department/10')">Dept 10 Members</button>
            <button onclick="testEndpoint('GET', '/api/members/search/Abdul')">Search Abdul</button>
            <button onclick="testEndpoint('GET', '/api/members/1/roles')">Member 1 Roles</button>
        </div>
    </div>

    <div class="section">
        <h3>Organization</h3>
        <div class="grid">
            <button onclick="testEndpoint('GET', '/api/departments')">All Departments</button>
            <button onclick="testEndpoint('GET', '/api/departments/10')">Department 10</button>
            <button onclick="testEndpoint('GET', '/api/units')">All Units</button>
            <button onclick="testEndpoint('GET', '/api/units/25')">Unit 25</button>
            <button onclick="testEndpoint('GET', '/api/states')">All States</button>
            <button onclick="testEndpoint('GET', '/api/states/1')">State 1</button>
            <button onclick="testEndpoint('GET', '/api/nationals')">All Nationals</button>
            <button onclick="testEndpoint('GET', '/api/levels')">All Levels</button>
        </div>
    </div>

    <div class="section">
        <h3>Role Management</h3>
        <div class="grid">
            <button onclick="testEndpoint('POST', '/api/members/1/roles/10')">Assign Role (1?10)</button>
            <button onclick="testEndpoint('DELETE', '/api/members/1/roles/10')">Remove Role (1?10)</button>
            <button onclick="testEndpoint('DELETE', '/api/members/1/roles')">Clear All Roles (1)</button>
        </div>
        
        <div style="margin: 10px 0;">
            <input type="number" id="memberId" placeholder="Member ID" value="1">
            <input type="number" id="levelDeptId" placeholder="Level Dept ID" value="10">
            <button onclick="assignCustomRole()">Assign Custom Role</button>
        </div>
    </div>

    <div class="section">
        <h3>Advanced Search</h3>
        <div class="grid">
            <button onclick="testEndpoint('GET', '/api/units/state/1')">Units in State 1</button>
            <button onclick="testEndpoint('GET', '/api/levels/1/departments')">Level 1 Depts</button>
        </div>

        <div style="margin: 10px 0;">
            <input type="text" id="searchName" placeholder="Search name" value="Abdul">
            <button onclick="searchMembers()">Search Members</button>
        </div>
    </div>

    <div class="section">
        <h3>Import Operations</h3>
        <div class="grid">
            <button onclick="testEndpoint('GET', '/api/import/test')">Test CSV File</button>
            <button onclick="testEndpoint('GET', '/api/import/exco')">Import EXCO</button>
        </div>

        <div class="upload-section">
            <input type="file" id="csvFile" accept=".csv">
            <button onclick="uploadAndImport()">Upload CSV</button>
        </div>
    </div>

    <div class="section" style="background: #ffebee;">
        <h3>Bulk Operations</h3>
        <button onclick="confirmClear()" style="background: #f44336;">Clear All EXCO</button>
    </div>

    <div class="section">
        <h3>Custom Test</h3>
        <select id="method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
        </select>
        <input type="text" id="customEndpoint" placeholder="/api/..." style="width: 300px;">
        <button onclick="testCustom()">Test</button>
        <br>
        <textarea id="customBody" placeholder="Request body (JSON) for POST/PUT" style="width: 100%; min-height: 80px; margin-top: 8px;"></textarea>
    </div>

    <div style="margin: 20px 0;">
        <button onclick="clearResults()" style="background: #f44336;">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        let authToken = null;

        function setAuthStatus(msg, color = '#388e3c') {
            document.getElementById('auth-status').textContent = msg;
            document.getElementById('auth-status').style.color = color;
        }

        async function testEndpoint(method, endpoint, body = null) {
            const resultsDiv = document.getElementById('results');
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
                const options = { method, headers };
                if (body && (method === 'POST' || method === 'PUT')) {
                    options.body = typeof body === 'string' ? body : JSON.stringify(body);
                }
                const response = await fetch(endpoint, options);
                const data = await response.text();
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result';
                resultDiv.innerHTML = `
                    <h3>${method} ${endpoint}</h3>
                    <p><strong>Status:</strong> <span style="color: ${response.ok ? 'green' : 'red'}">${response.status} ${response.statusText}</span></p>
                    <pre>${data}</pre>
                `;
                resultsDiv.appendChild(resultDiv);
                resultDiv.scrollIntoView({ behavior: 'smooth' });
                // If login, try to extract token
                if (endpoint.includes('/auth/login') && response.ok) {
                    try {
                        const json = JSON.parse(data);
                        if (json.token) {
                            authToken = json.token;
                            setAuthStatus('Logged in');
                        }
                    } catch {}
                }
                if (endpoint.includes('/auth/logout') && response.ok) {
                    authToken = null;
                    setAuthStatus('Logged out', '#d32f2f');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function authLogin() {
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-password').value;
            if (!username || !password) {
                setAuthStatus('Username and password required', '#d32f2f');
                return;
            }
            setAuthStatus('Logging in...', '#1976d2');
            await testEndpoint('POST', '/api/auth/login', { username, password });
        }

        async function authRegister() {
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-password').value;
            const email = document.getElementById('auth-email').value;
            if (!username || !password || !email) {
                setAuthStatus('All fields required for register', '#d32f2f');
                return;
            }
            setAuthStatus('Registering...', '#1976d2');
            await testEndpoint('POST', '/api/auth/register', { username, password, email });
        }

        async function authLogout() {
            setAuthStatus('Logging out...', '#1976d2');
            await testEndpoint('POST', '/api/auth/logout');
        }

        async function uploadAndImport() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a CSV file first');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('csvFile', file);
                
                const response = await fetch('/api/import/exco/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.text();
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result';
                resultDiv.innerHTML = `
                    <h3>Upload: ${file.name}</h3>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <pre>${data}</pre>
                `;
                
                document.getElementById('results').appendChild(resultDiv);
                
            } catch (error) {
                alert('Upload failed: ' + error.message);
            }
        }

        function assignCustomRole() {
            const memberId = document.getElementById('memberId').value;
            const levelDeptId = document.getElementById('levelDeptId').value;
            testEndpoint('POST', `/api/members/${memberId}/roles/${levelDeptId}`);
        }

        function searchMembers() {
            const name = document.getElementById('searchName').value;
            testEndpoint('GET', `/api/members/search/${name}`);
        }

        function testCustom() {
            const method = document.getElementById('method').value;
            const endpoint = document.getElementById('customEndpoint').value;
            let body = null;
            if (method === 'POST' || method === 'PUT') {
                const raw = document.getElementById('customBody').value;
                if (raw.trim()) {
                    try {
                        body = JSON.parse(raw);
                    } catch {
                        body = raw; // send as-is if not valid JSON
                    }
                }
            }
            testEndpoint(method, endpoint, body);
        }

        function confirmClear() {
            if (confirm('Clear ALL EXCO assignments?')) {
                testEndpoint('DELETE', '/api/exco/clear');
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
    </script>
</body>
</html>
